# Render blueprint: one-click deploy of both halves (prepared 2026-07-15;
# not yet exercised against a live Render account).
#
# Steps: push this file to GitHub (done) -> render.com -> New -> Blueprint ->
# pick the repo -> fill in the secret env vars when prompted -> Apply.
# Free-tier notes: the backend sleeps after ~15 min idle (~1 min cold start),
# and its disk is ephemeral -- SQLite data resets on every deploy/restart.

services:
  - type: web
    name: udaanher-saathi-api
    runtime: python
    rootDir: backend
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SARVAM_API_KEY
        sync: false # paste in the dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.1
      - key: TTS_SPEAKER
        value: priya
      - key: DEFAULT_LANGUAGE
        value: hi-IN
      - key: DATABASE_URL
        value: sqlite:///data/app.db
      - key: CORS_ORIGINS
        value: https://udaanher-saathi.onrender.com

  - type: web
    name: udaanher-saathi
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://udaanher-saathi-api.onrender.com
